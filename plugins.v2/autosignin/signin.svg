<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="4" y="4" rx="20" ry="20" width="120" height="120" fill="url(#bg)"/>
  <!-- 日历主体 -->
  <rect x="24" y="40" width="80" height="64" rx="8" fill="white" opacity="0.95"/>
  <!-- 日历顶部色条 -->
  <rect x="24" y="40" width="80" height="18" rx="8" fill="#5a67d8" opacity="0.9"/>
  <rect x="24" y="52" width="80" height="6" fill="#5a67d8"/>
  <!-- 日历挂环 -->
  <circle cx="48" cy="36" r="6" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="80" cy="36" r="6" fill="none" stroke="white" stroke-width="3"/>
  <!-- 日期数字 28 -->
  <text x="64" y="88" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2d3748" text-anchor="middle">28</text>
  <!-- 勾选标记 -->
  <circle cx="88" cy="50" r="16" fill="#48bb78" stroke="white" stroke-width="2"/>
  <polyline points="80,50 86,56 96,44" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>